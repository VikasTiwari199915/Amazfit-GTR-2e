retrofit = { group = "com.squareup.retrofit2", name = "retrofit", version.ref = "retrofit" }
converterGson = { group = "com.squareup.retrofit2", name = "converter-gson", version.ref = "converterGson" }
loggingInterceptor = { group = "com.squareup.okhttp3", name = "logging-interceptor", version.ref = "loggingInterceptor" }
lombok = { group = "org.projectlombok", name = "lombok", version.ref = "lombok" }
jacksonDatabind = { group = "tools.jackson.core", name = "jackson-databind", version.ref = "jacksonDatabind" }
jacksonAnnotations = { group = "com.fasterxml.jackson.core", name = "jackson-annotations", version.ref = "jacksonAnnotations" }
[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
