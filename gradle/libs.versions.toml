[versions]
agp = "8.12.0"
appcompat = "1.7.1"
material = "1.13.0"
activity = "1.13.0"
constraintlayout = "2.2.1"
circularprogressbar = "3.1.0"
cardview = "1.0.0"
retrofit = "3.0.0"
converterGson = "3.0.0"
loggingInterceptor = "5.3.2"
lombok = "1.18.44"
jacksonDatabind = "3.1.0"
jacksonAnnotations = "2.21"


[libraries]
appcompat = { group = "androidx.appcompat", name = "appcompat", version.ref = "appcompat" }
